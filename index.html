<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexBank — Login</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
</head>
<body>

<div class="auth-wrapper">
  <!-- Brand Side -->
  <div class="auth-brand">
    <div class="logo-icon">🏦</div>
    <h1>NexBank</h1>
    <p>Your complete digital banking experience — fast, secure, and always accessible.</p>
    <ul class="auth-features">
      <li>Instant deposits & withdrawals</li>
      <li>Peer-to-peer transfers</li>
      <li>Full transaction history</li>
      <li>Secure local storage</li>
    </ul>
  </div>

  <!-- Form Side -->
  <div class="auth-form-side">
    <div class="auth-card">
      <div>
        <h2>Welcome back 👋</h2>
        <p class="sub">Login to your NexBank account</p>
      </div>

      <form onsubmit="handleLogin(event)" novalidate>
        <div style="display:flex;flex-direction:column;gap:1rem;">
          <div class="form-group">
            <label for="email">Email address</label>
            <input type="email" id="email" placeholder="you@example.com" required />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="••••••••" required />
          </div>
          <div id="auth-msg" class="auth-msg"></div>
          <button type="submit" class="btn btn-primary btn-full">Login</button>
        </div>
      </form>

      <p class="auth-link">Don't have an account? <a href="register.html">Create one</a></p>
    </div>
  </div>
</div>

<script src="js/storage.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
