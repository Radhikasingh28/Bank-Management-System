<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexBank — Register</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
</head>
<body>

<div class="auth-wrapper">
  <!-- Brand Side -->
  <div class="auth-brand">
    <div class="logo-icon">🏦</div>
    <h1>NexBank</h1>
    <p>Join thousands of users managing their money smarter every day.</p>
    <ul class="auth-features">
      <li>Free account — no fees ever</li>
      <li>Instant account number assigned</li>
      <li>Transfer money to anyone</li>
      <li>Full spending insights</li>
    </ul>
  </div>

  <!-- Form Side -->
  <div class="auth-form-side">
    <div class="auth-card">
      <div>
        <h2>Create account ✨</h2>
        <p class="sub">Open your NexBank account in seconds</p>
      </div>

      <form onsubmit="handleRegister(event)" novalidate>
        <div style="display:flex;flex-direction:column;gap:1rem;">
          <div class="form-group">
            <label for="name">Full name</label>
            <input type="text" id="name" placeholder="Radhika Sharma" required />
          </div>
          <div class="form-group">
            <label for="email">Email address</label>
            <input type="email" id="email" placeholder="you@example.com" required />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Min. 4 characters" required />
          </div>
          <div class="form-group">
            <label for="confirm">Confirm password</label>
            <input type="password" id="confirm" placeholder="Repeat your password" required />
          </div>
          <div id="auth-msg" class="auth-msg"></div>
          <button type="submit" class="btn btn-primary btn-full">Create Account</button>
        </div>
      </form>

      <p class="auth-link">Already have an account? <a href="index.html">Login</a></p>
    </div>
  </div>
</div>

<script src="js/storage.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
